name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campus_booking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: campus-booking/backend/package-lock.json

      - name: Install dependencies
        working-directory: campus-booking/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: campus-booking/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_booking
        run: npx prisma generate

      - name: Run migrations
        working-directory: campus-booking/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_booking
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: campus-booking/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_booking
          JWT_SECRET: test-secret-for-ci
        run: npx ts-node --transpile-only prisma/seed.ts

      - name: Run tests
        working-directory: campus-booking/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_booking
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: campus-booking/backend/coverage/
